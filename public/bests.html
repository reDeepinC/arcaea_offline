<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcaea Offline - Bests</title>
</head>
<link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" type="text/css" href="/style/sidebar.css">
<link rel="stylesheet" type="text/css" href="/style/header.css">
<link rel="icon" href="../favicon.ico">
<style>
    body {
        height: 100vh;
        margin: 0px;
        padding: 0px;
        background-image: url('/assets/others/bg.jpg');
        background-size: cover;
        background-attachment: fixed;
        background-repeat: no-repeat;
        color: white;
    }
    main {
        position: absolute;
        top: 0px;
        width: 100%;
        height: 100%;
    }
    .user-info {
        display: flex;
        flex-direction: row;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
        justify-content: space-between;
        margin-top: 80px;
        font-weight: 600;
    }
    .sub-user-info {
        height: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
    }
    main span.avatar {
        margin: 6px;
        margin-left: 40px;
        margin-right: 20px;
        cursor: pointer;
        transition: ease scale 0.25s;
    }
    main span.avatar:hover {
        scale: 1.1;
    }
    main span.avatar img{
        height: 82px;
        width: calc(width);
    }
    main span.username {
        font-size: 32px;
        font-family: 'Courier New', Courier, monospace;
        overflow-x: hidden;
    }
    .rating-info {
        position: relative;
        width: 200px;
        color: rgb(220, 220, 220);
        margin-left: 20px;
    }
    .max-potential, .best-30, .recent-10 {
        background: linear-gradient(to right, #0077ff, #ca0b0b);
        border-radius: 15px;
        padding: 2px;
        padding-left: 5px;
        margin: 3px;
    }
    .bests-board {
        width: 100%;
        padding: 0 12px 16px;
        box-sizing: border-box;
        background-color: rgba(0, 0, 0, 0.5);
    }
    .bests-row {
        display: grid;
        grid-template-columns: repeat(15, 1fr);
        gap: 8px;
        margin-bottom: 8px;
    }
    .best-card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        box-sizing: border-box;
        min-width: 0;
        padding: 6px;
        background: rgba(0, 0, 0, 0.65);
        border: 6px solid #B056FF;
        border-radius: 4px;
        color: rgb(220, 220, 220);
    }
    .best-card-name {
        font-size: 14.3px;
        line-height: 1.25;
        margin-bottom: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: center;
    }
    .best-card-cover {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 0;
        display: block;
        margin-bottom: 4px;
    }
    .best-card-score {
        font-size: 16.9px;
        font-weight: 600;
        text-align: center;
        white-space: nowrap;
        letter-spacing: 0.02em;
    }
    .best-card-constant,
    .best-card-pt {
        font-size: 15.6px;
        text-align: center;
        line-height: 1.35;
    }
    .max-potential,.recent-10,.best-30 {
        white-space: nowrap;
    }
    .avatar-list {
        display: flex;
        opacity: 0;
        flex-direction: row;
        flex-wrap: wrap;
        width: 300px;
        height: 360px;
        background-color: rgba(0, 0, 0, 0.8);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 30px;
        overflow-y: scroll;
        padding: 20px;
        z-index: -10;
        transition: ease opacity 0.3s;
    }
    .avatar-list img{
        width: 60px;
        height: 60px;
        margin: 10px;
        cursor: pointer;
        transition: ease scale 0.2s;
    }
    .avatar-list img:hover {
        scale: 1.2;
    }
    .rank{
        position: relative;
        left: -50px;
        top: 26px;
        width: 45px;
        height: 45px;
    }
    .rank img{
        width: 100%;
        height: 100%;
    }
    @font-face {
        font-family: 'Exo_SemiBold';
        src: url('/assets/others/Exo-SemiBold.ttf') format('truetype');
        font-weight: 700;
    }
    .rank-rating {
        display: flex;
        width: 32px;
        flex-direction: column;
        align-items: center;
        font-family: Exo_SemiBold;
        position: relative;
        top: 26px;
        left: -89px;
    }
    .overflow {
        background-color: rgba(0, 0, 0, 0.5);
        margin-top: 8px;
    }
    .overflow h2 {
        margin: 12px 0 8px;
    }
</style>
<body>
    <header></header>
    <div class="sidebar"></div>
    <div class="avatar-list"></div>
    <main>
        <div class="user-info">
            <div class="sub-user-info">
                <span class="avatar" onclick="avatar_list_toggle()"><img src="/assets/others/default.png" alt=""></span>
                <span class="rank"><img class="rank-img" src="/assets/others/rating_off.png" alt=""></span>
                <span class="rank-rating"></span>
                <span class="username"></span>
            </div>
            <div class="rating-info">
                <div class="max-potential">Max Potential</div>
                <div class="best-30">Best 30</div>
                <div class="recent-10">Recent 10</div>
            </div>
        </div>
        <div class="bests-board" id="bests-board"></div>
        <div class="overflow" align="center">
            <h2>OVERFLOW</h2>
            <div class="bests-board" id="overflow-board"></div>
        </div>
    </main>
</body>
<script src="/scripts/checkwidth.js"></script>
<script src="/scripts/logout.js"></script>
<script src="/scripts/bests.js"></script>
</html>
